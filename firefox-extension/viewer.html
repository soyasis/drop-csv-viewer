<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drop CSV Viewer</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f9fafb;
    --zebra: #fafbfc;
    --hover: #f3f4f6;
    --text: #1f2328;
    --muted: #6b7280;
    --border: #e5e7eb;
    --header-bg: #f6f7f9;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --shadow: rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #131517;
      --bg-soft: #17191c;
      --zebra: #161a1e;
      --hover: #1e2329;
      --text: #e6e8ea;
      --muted: #8b949e;
      --border: #272b30;
      --header-bg: #1a1d21;
      --accent: #4c8dff;
      --accent-soft: #16314f;
      --shadow: rgba(0,0,0,.4);
    }
  }
  :root[data-theme="dark"] {
    --bg: #131517;
    --bg-soft: #17191c;
    --zebra: #161a1e;
    --hover: #1e2329;
    --text: #e6e8ea;
    --muted: #8b949e;
    --border: #272b30;
    --header-bg: #1a1d21;
    --accent: #4c8dff;
    --accent-soft: #16314f;
    --shadow: rgba(0,0,0,.4);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Toolbar ---- */
  .toolbar {
    flex: none;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-soft);
  }
  .toolbar.hidden { display: none; }
  .file-meta { display: flex; align-items: baseline; gap: 8px; min-width: 0; cursor: pointer; }
  .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 38vw; }
  .file-dims { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .spacer { flex: 1; }
  .search {
    width: 280px; max-width: 40vw;
    padding: 6px 11px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color .12s, box-shadow .12s;
  }
  .search::placeholder { color: var(--muted); }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .count { color: var(--muted); font-size: 12px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .icon-btn {
    flex: none; display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; padding: 0; border: 1px solid var(--border); border-radius: 7px;
    background: var(--bg); color: var(--muted); cursor: pointer;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* ---- Table ---- */
  .table-wrap { flex: 1; overflow: auto; position: relative; }
  table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
  thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--header-bg);
    text-align: left;
    font-weight: 600;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 1px 0 var(--border);
  }
  thead th:hover { background: var(--hover); }
  thead th.num { text-align: right; }
  thead th .arrow { color: var(--accent); margin-left: 5px; font-size: 10px; display: inline-block; }
  thead th .arrow:empty { margin: 0; }
  .resizer { position: absolute; top: 0; right: 0; width: 8px; height: 100%; cursor: col-resize; z-index: 1; }
  .resizer:hover { background: var(--accent); opacity: .35; }
  thead th .hname { cursor: pointer; }
  thead th .caret { margin-left: 6px; font-size: 11px; line-height: 1; color: var(--muted); opacity: .55; cursor: pointer; }
  thead th .caret:hover { opacity: 1; }
  thead th .caret.active { opacity: 1; color: var(--accent); }
  thead th.selcol { background: var(--accent-soft); }
  tbody td.sel { background: var(--accent-soft) !important; }
  tbody td.active { outline: 2px solid var(--accent); outline-offset: -2px; }
  tbody td[data-c] { cursor: cell; }

  /* ---- Status bar ---- */
  .statusbar {
    flex: none; display: flex; align-items: center; gap: 14px;
    padding: 6px 14px; border-top: 1px solid var(--border); background: var(--bg-soft); font-size: 12px;
  }
  .statusbar.hidden { display: none; }
  .statusbar .count { color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .statusbar .stats { margin-left: auto; color: var(--text); white-space: nowrap; font-variant-numeric: tabular-nums; }
  th.rownum, td.rownum {
    position: sticky; left: 0; z-index: 1;
    width: 56px; min-width: 56px; text-align: right; color: var(--muted);
    font-variant-numeric: tabular-nums; cursor: default;
    background: var(--bg-soft); padding-left: 12px; padding-right: 12px;
  }
  th:nth-child(2), td:nth-child(2) { position: sticky; left: 56px; }
  tbody td:nth-child(2) { z-index: 1; background: var(--bg); }
  thead th.rownum, thead th:nth-child(2) { z-index: 4; }
  thead th.rownum { box-shadow: 0 1px 0 var(--border); }
  tbody td {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    max-width: 460px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:nth-child(even) td { background: var(--zebra); }
  tbody tr:nth-child(even) td.rownum { background: var(--bg-soft); }
  tbody tr:hover td { background: var(--hover); }

  /* ---- Empty state ---- */
  .empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: var(--muted); cursor: pointer; padding: 40px; text-align: center;
  }
  .empty.hidden { display: none; }
  .empty .box {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 48px 64px; border: 2px dashed var(--border); border-radius: 16px;
    transition: border-color .15s, background .15s;
  }
  .empty:hover .box { border-color: var(--accent); background: var(--bg-soft); }
  .empty svg { width: 46px; height: 46px; stroke: var(--muted); }
  .empty h1 { font-size: 17px; font-weight: 600; color: var(--text); margin: 0; }
  .empty p { margin: 0; font-size: 13px; }
  kbd {
    font: inherit; font-size: 11px; padding: 1px 5px; border: 1px solid var(--border);
    border-bottom-width: 2px; border-radius: 4px; background: var(--bg); color: var(--text);
  }

  /* ---- Drag overlay ---- */
  .drop-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    backdrop-filter: blur(1px);
    pointer-events: none;
  }
  .drop-overlay.show { display: flex; }
  .drop-overlay .pill {
    background: var(--bg); border: 2px solid var(--accent); border-radius: 14px;
    padding: 20px 32px; font-size: 16px; font-weight: 600; color: var(--accent);
    box-shadow: 0 12px 40px var(--shadow);
  }
</style>
</head>
<body>
  <div class="toolbar hidden" id="toolbar">
    <div class="file-meta" id="fileMeta" title="Load another file">
      <span class="file-name" id="fileName"></span>
      <span class="file-dims" id="fileDims"></span>
    </div>
    <div class="spacer"></div>
    <input type="search" class="search" id="search" placeholder="Filter…  (press /)" autocomplete="off" spellcheck="false">
    <button class="icon-btn" id="download" title="Download current view as CSV">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/>
      </svg>
    </button>
    <button class="icon-btn" id="theme" title="Toggle light / dark theme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>

  <div class="table-wrap" id="tableWrap" style="display:none">
    <table id="table"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  </div>

  <div class="empty" id="empty">
    <div class="box">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 16V4m0 12-4-4m4 4 4-4"/><path d="M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2"/>
      </svg>
      <h1>Drop a CSV here</h1>
      <p>or click to choose · paste with <kbd>⌘V</kbd></p>
    </div>
  </div>

  <div class="statusbar hidden" id="statusbar">
    <span class="count" id="count"></span>
    <span class="stats" id="stats"></span>
  </div>

  <div class="drop-overlay" id="overlay"><div class="pill">Drop to open</div></div>
  <input type="file" id="fileInput" accept=".csv,.tsv,.txt,text/csv,text/tab-separated-values" hidden>

<script src="viewer.js"></script>
</body>
</html>
